<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw 企业AI内容营销 Skills 套件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; padding: 0; }
        .poster { width: 600px; background: linear-gradient(180deg, #0d1f35 0%, #0a1525 100%); }
        
        .header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #1d4ed8 100%);
            padding: 45px 30px 35px;
            text-align: center;
            position: relative;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -30%; left: -30%; width: 160%; height: 160%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
        }
        .logo { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 18px; position: relative; z-index: 1; }
        .logo-icon {
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 56px; height: 56px; }
        .logo-text { font-size: 32px; font-weight: 800; color: #fff; letter-spacing: 1px; }
        
        h1 { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 10px; position: relative; z-index: 1; }
        .subtitle { font-size: 16px; color: rgba(255,255,255,0.85); }
        
        .skills-section { padding: 25px 20px; }
        .section-title { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 18px; text-align: center; }
        
        .skill-item { display: flex; align-items: center; background: rgba(255,255,255,0.03); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); }
        
        .skill-icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 14px; flex-shrink: 0;
        }
        .skill-icon svg { width: 26px; height: 26px; }
        
        .skill-icon.blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .skill-icon.red { background: linear-gradient(135deg, #f43f5e, #e11d48); }
        .skill-icon.green { background: linear-gradient(135deg, #10b981, #059669); }
        .skill-icon.orange { background: linear-gradient(135deg, #f97316, #ea580c); }
        .skill-icon.purple { background: linear-gradient(135deg, #a855f7, #9333ea); }
        .skill-icon.cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        
        .skill-icon svg { fill: #fff; }
        
        .skill-info { flex: 1; }
        .skill-name { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 3px; }
        .skill-desc { font-size: 11px; color: #94a3b8; }
        .skill-price { font-size: 16px; font-weight: 700; color: #fbbf24; white-space: nowrap; margin-left: 8px; }
        
        .price-section { background: linear-gradient(180deg, #1a2d47 0%, #0f1f32 100%); padding: 28px 25px; text-align: center; border-top: 1px solid rgba(59,130,246,0.15); }
        .price-label { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .price-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .price-original { font-size: 16px; color: #64748b; text-decoration: line-through; }
        .price-value { font-size: 38px; font-weight: 800; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; padding: 10px 24px; border-radius: 25px; font-size: 15px; font-weight: 600; margin-top: 15px; }
        
        .footer { background: #060a12; padding: 14px 20px; text-align: center; color: #475569; font-size: 12px; }
    </style>
</head>
<body>
    <div class="poster">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <!-- 纯红色小龙虾 SVG - 简洁版 -->
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- 身体 -->
                        <ellipse cx="32" cy="38" rx="16" ry="18" fill="#FF4D4D"/>
                        <ellipse cx="32" cy="38" rx="13" ry="15" fill="#FF6B6B"/>
                        <!-- 头部/眼睛区域 -->
                        <circle cx="28" cy="30" r="5" fill="#2D1B14"/>
                        <circle cx="36" cy="30" r="5" fill="#2D1B14"/>
                        <circle cx="29" cy="29" r="2" fill="#fff"/>
                        <circle cx="37" cy="29" r="2" fill="#fff"/>
                        <!-- 两只大钳子 -->
                        <path d="M14 32 C8 28, 6 22, 12 18 C16 15, 18 18, 16 24 C14 28, 16 32, 14 32Z" fill="#FF4D4D" stroke="#E63939" stroke-width="1"/>
                        <path d="M50 32 C56 28, 58 22, 52 18 C48 15, 46 18, 48 24 C50 28, 48 32, 50 32Z" fill="#FF4D4D" stroke="#E63939" stroke-width="1"/>
                        <!-- 钳子内部细节 -->
                        <path d="M13 28 Q15 26, 14 24" stroke="#E63939" stroke-width="1.5" fill="none"/>
                        <path d="M51 28 Q49 26, 50 24" stroke="#E63939" stroke-width="1.5" fill="none"/>
                        <!-- 小脚 -->
                        <path d="M22 52 L20 56" stroke="#FF4D4D" stroke-width="2" stroke-linecap="round"/>
                        <path d="M32 54 L32 58" stroke="#FF4D4D" stroke-width="2" stroke-linecap="round"/>
                        <path d="M42 52 L44 56" stroke="#FF4D4D" stroke-width="2" stroke-linecap="round"/>
                        <!-- 尾巴 -->
                        <path d="M26 54 Q32 60, 38 54" fill="#FF4D4D"/>
                    </svg>
                </div>
                <span class="logo-text">OpenClaw</span>
            </div>
            <h1>企业AI内容营销 Skills 套件</h1>
            <p class="subtitle">让企业内容营销全自动运行</p>
        </div>
        
        <div class="skills-section">
            <div class="section-title">Included Skills</div>
            
            <!-- 每日行业信息报告 -->
            <div class="skill-item">
                <div class="skill-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path>

                <div class="skill-info">

                    <div class="skill-desc">自动收集行业资讯并生成AI报告</div>
                </div>
                <div class="skill-price">¥99</div>

            <!-- 小红书图文生成 -->
            <div class="skill-item">
                <div class="skill-icon red">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                        <path d="M12 18h.01"></path>
                        <path d="M9 6h6"></path>
                        <path d="M9 9h6"></path>
                    </svg>
                </div>
                <div class="skill-info">

                    <div class="skill-desc">自动生成小红书图文内容</div>
                </div>
                <div class="skill-price">¥199</div>
            </div>
            
            <!-- 公众号图文预发布 -->
            <div class="skill-item">
                <div class="skill-icon green">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2h3"></path>
                        <path d="M6 2h3a2 2 0 0 1 2 2v16a2 2 0 0 0 2 2h3"></path>

                        <path d="M10 10h.01"></path>

                    </svg>
                </div>
                <div class="skill-info">

                    <div class="skill-desc">自动生成并预发布公众号文章</div>
                </div>
                <div class="skill-price">¥299</div>
            </div>
            
            <!-- 营销海报生成 -->
            <div class="skill-item">
                <div class="skill-icon orange">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                        <path d="M2 2l7.586 7.586"></path>

                    </svg>
                </div>

                    <div class="skill-name">营销海报生成</div>
                    <div class="skill-desc">自动生成营销海报</div>

            <!-- 广告创意短视频 -->
            <div class="skill-item">
                <div class="skill-icon purple">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m22 8-6 4 6 4V8Z"></path>
                        <rect width="14" height="12" x="2" y="6" rx="2" ry="2"></rect>
                    </svg>
                </div>
                <div class="skill-info">
                    <div class="skill-name">广告创意短视频</div>
                    <div class="skill-desc">自动生成广告创意短视频</div>
                </div>
                <div class="skill-price">¥199</div>
            </div>
            
            <!-- 网站宣传与培训视频 -->
            <div class="skill-item">
                <div class="skill-icon cyan">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </div>
                <div class="skill-info">
                    <div class="skill-name">网站宣传与培训视频</div>
                    <div class="skill-desc">制作网站宣传、培训材料等视频</div>
                </div>
                <div class="skill-price">¥199</div>
            </div>
        </div>
        
        <div class="price-section">
            <div class="price-label">Skills 套件打包价</div>
            <div class="price-row">
                <span class="price-original">¥1094</span>
                <span class="price-value">¥999</span>
            </div>
            <div class="badge">🎁 限时额外赠送价值¥199部署服务</div>
        </div>
        
        <div class="footer">⚡ OpenClaw AI · 一套AI自动化系统</div>
    </div>
</body>
</html>
