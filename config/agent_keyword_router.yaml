# 路由行为配置
behavior:
  # 匹配模式
  match_mode: "first_match"  # first_match: 第一个匹配的Agent; multi_match: 多个Agent并行
  
  # 最小关键词匹配数
  min_keywords: 1

  # 最低有效分数；低于该值则不认为命中某个领域
  min_score: 1.0
  
  # 是否区分大小写
  case_sensitive: false
  
  # 是否包含中文分词
  chinese_tokenization: true
  
  # 相似度阈值 (0-1)
  similarity_threshold: 0.8

  # 低信号泛词：命中时只给低权重，避免把任务带偏
  low_signal_keywords:
    - "分析"
    - "设计"
    - "实现"
    - "规划"
    - "策略"
    - "建议"
    - "发布"
    - "自动化"
    - "技术"
    - "功能"
    - "用户"

# 消息处理配置
message_handling:
  # 收到消息后的处理流程
  process:
    - "解析关键词"
    - "匹配Agent"
    - "调用sessions_send"
    - "等待响应"
    - "返回结果"
  
  # 如果Agent响应超时（秒）
  timeout_seconds: 300
  
  # 失败重试次数
  retry_count: 1
  
  # 失败后的fallback
  fallback: "chief"

# 特殊规则
special_rules:
  # 多人同时被@时的处理
  multi_mention:
    mode: "parallel"  # parallel: 并行询问所有Agent; sequential: 顺序执行
    max_agents: 3
  
  # 紧急任务标识
  urgent_keywords:
    - "紧急"
    - "P0"
    - "立刻"
    - "马上"
    - "现在"
  
  # 长任务标识（需要拆分的任务）
  long_task_keywords:
    - "大项目"
    - "重构"
    - "架构设计"
    - "全面"

